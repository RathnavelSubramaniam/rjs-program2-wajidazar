name: Autograding Tests
'on':
- push
- repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: ubuntu-latest
    if: github.actor != 'github-classroom[bot]'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: testtemplate
      id: testtemplate
      uses: classroom-resources/autograding-io-grader@v1
      with:
        test-name: testtemplate
        setup-command: ''
        command: node greet.js
        input: alice, 25
        expected-output: Hello Alice, you are 20 years old.
        comparison-method: contains
        timeout: 10
        max-score: 10
    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        TESTTEMPLATE_RESULTS: "${{steps.testtemplate.outputs.result}}"
      with:
        runners: testtemplate
